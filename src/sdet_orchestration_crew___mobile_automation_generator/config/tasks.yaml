---
parse_test_cases_and_extract_screen_flow:
  description: >
    Read the provided test_cases.csv file for {feature_name} and parse
    the manual test cases. Extract the test case titles, detailed test steps, and
    expected results. Analyze the test steps to identify the logical mobile application
    screens involved in each test scenario. Group related test steps by the screens
    they interact with and create a logical flow mapping.
    FEATURE NAME: {feature_name}
    CSV CONTENT:
    {csv_content}
  expected_output: >
    'A structured JSON object containing: 1) Parsed test cases with
    titles, steps, and expected results, 2) Identified logical mobile screens for
    each test scenario, 3) Screen flow mapping showing the sequence of screens for
    each test case, 4) Atomic test actions grouped by screen. The JSON should be well-formatted
    and ready for the next agent to consume.'
  agent: product_owner_and_test_router
analyze_screenshots_and_generate_locators:
  description: >
    Your task is to extract all locators for all UI states using your custom tool.
    
    1. Execute the `LocatorExtractionTool`. It requires no arguments. It will automatically scan the 'assets/screens' folder, process the files in parallel, and return a master JSON dictionary.
    2. Review the returned master JSON dictionary.
    3. Ensure the extracted locators cover the required elements identified by the Product Owner in the previous step.
  expected_output: >
    'The master comprehensive JSON dictionary containing all cross-platform locators where keys are logical element
    names (e.g., ''login_button'', ''username_field'', ''submit_button'') and values
    are cross-platform locator dictionaries in the format: {''android'': {''by'':
    ''id'', ''value'': ''resource_id''}, ''ios'': {''by'': ''accessibility_id'', ''value'':
    ''accessibility_identifier''}}. Include fallback locators where primary ones might
    be unreliable.' Return ONLY valid JSON. Do not include markdown formatting blocks like ```json.
  agent: multimodal_vision_and_xml_analyzer
  context:
  - parse_test_cases_and_extract_screen_flow
generate_page_object_model_classes:
  description: Using the cross-platform locator dictionary from the previous task
    and the existing framework context (base_page.py and utilities), write complete
    Python Page Object Model classes for {feature_name}. Each screen identified in
    the first task should have its own POM class. Ensure all classes inherit from
    the base page class, implement proper locator handling for cross-platform support,
    and include methods for all identified actions.
  expected_output: 'Complete Python code strings for all required Page Object classes.
    Each class should: 1) Inherit from base_page.py, 2) Define cross-platform locators
    using the provided dictionary, 3) Include methods for all screen actions (click,
    type, verify), 4) Handle both Android and iOS platforms elegantly, 5) Follow proper
    naming conventions and documentation. Output should be ready-to-use Python code.'
  agent: page_object_model_pom_crafter
  context:
  - analyze_screenshots_and_generate_locators
write_pytest_test_scripts:
  description: Using the original test logic from the Product Owner and the generated
    POM classes from the Automation Architect, write the final executable test_{feature_name}.py
    Pytest script. The script should properly import framework fixtures (like conftest.py),
    instantiate the generated page objects, orchestrate the test flows according to
    the screen sequences, and include strict assertions based on the expected results
    from the original test cases.
  expected_output: 'A complete, executable test_{feature_name}.py Pytest script containing:
    1) Proper imports and fixtures, 2) Test functions for each test case scenario,
    3) Page object instantiation and method calls, 4) Assertions validating expected
    outcomes, 5) Proper test setup and teardown, 6) Clear, descriptive test function
    names and docstrings. The script should be immediately runnable with pytest command.'
  agent: pytest_automation_synthesizer
  context:
  - generate_page_object_model_classes
review_and_finalize_code_quality:
  description: Review all the Python code generated by the Automation Architect and
    SDET Script Writer for {feature_name}. Check for SOLID principle violations, code
    anti-patterns, and PEP8 compliance issues. Ensure Single Responsibility Principle
    is followed (no assertions inside Page Objects), fix any formatting issues, remove
    code duplication, and optimize the overall code structure for maintainability.
  expected_output: 'Final, deployment-ready Python files with: 1) Clean, PEP8-compliant
    formatting, 2) Fixed anti-patterns and SOLID principle violations, 3) Optimized
    code structure, 4) Proper separation of concerns, 5) Comprehensive code comments
    and docstrings, 6) Final validation that all code is production-ready. Provide
    both the corrected POM classes and the final Pytest script files.'
  agent: lead_quality_assurance_reviewer
  context:
  - write_pytest_test_scripts
